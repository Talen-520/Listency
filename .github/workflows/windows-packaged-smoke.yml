name: Windows Packaged Smoke

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "assets/**"
  workflow_dispatch:

concurrency:
  group: windows-packaged-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaged-smoke:
    name: Build and smoke packaged Windows app
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/backend/requirements.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/desktop/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path app/desktop/src-tauri/Cargo.toml

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run backend tests
        working-directory: app/backend
        run: python -m unittest discover -s tests

      - name: Install desktop dependencies
        working-directory: app/desktop
        run: pnpm install --frozen-lockfile

      - name: Build Windows backend sidecar
        working-directory: app/desktop
        run: pnpm run backend:sidecar

      - name: Smoke test packaged backend sidecar
        working-directory: app/desktop
        timeout-minutes: 3
        run: |
          pnpm run backend:sidecar:smoke *> smoke.log
          $exitCode = $LASTEXITCODE
          Get-Content smoke.log
          if ($exitCode -ne 0) {
            $message = (Get-Content smoke.log -Raw).Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Packaged backend smoke failed::$message"
            exit $exitCode
          }

      - name: Download cloudflared connector
        working-directory: app/desktop
        run: pnpm run cloudflared:sidecar

      - name: Build Windows Tauri app
        working-directory: app/desktop
        run: pnpm exec tauri build --bundles nsis

      - name: Package portable Windows app
        working-directory: app/desktop
        run: pnpm run windows:portable

      - name: Verify Windows GUI subsystem
        working-directory: app/desktop
        run: pnpm run windows:subsystem:check

      - name: Smoke test Windows desktop launcher
        working-directory: app/desktop
        timeout-minutes: 3
        run: pnpm run windows:launcher:smoke

      - name: Upload Windows smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: listency-windows-smoke-${{ github.sha }}
          if-no-files-found: warn
          path: app/desktop/smoke.log
