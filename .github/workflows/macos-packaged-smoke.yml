name: macOS Packaged Smoke

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: macos-packaged-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaged-smoke:
    name: Build and smoke packaged macOS app
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/backend/requirements.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/desktop/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run backend tests
        working-directory: app/backend
        run: python -m unittest discover -s tests

      - name: Install desktop dependencies
        working-directory: app/desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: app/desktop
        run: pnpm run build

      - name: Build macOS backend sidecar
        working-directory: app/desktop
        run: pnpm run backend:sidecar

      - name: Smoke test packaged backend sidecar
        working-directory: app/desktop
        timeout-minutes: 3
        run: pnpm run backend:sidecar:smoke 2>&1 | tee smoke.log

      - name: Download cloudflared connector
        working-directory: app/desktop
        run: pnpm run cloudflared:sidecar

      - name: Build macOS Tauri app
        working-directory: app/desktop
        run: pnpm exec tauri build --bundles app

      - name: Smoke test macOS desktop launcher
        working-directory: app/desktop
        timeout-minutes: 3
        run: pnpm run macos:launcher:smoke

      - name: Package macOS app zip
        working-directory: app/desktop/src-tauri/target/release/bundle/macos
        run: ditto -c -k --sequesterRsrc --keepParent Listency.app Listency-macos.zip

      - name: Stage macOS release artifacts
        run: |
          rm -rf app/desktop/dist-artifacts/macos
          mkdir -p app/desktop/dist-artifacts/macos
          cp app/desktop/src-tauri/target/release/bundle/macos/Listency-macos.zip app/desktop/dist-artifacts/macos/
          cp app/desktop/smoke.log app/desktop/dist-artifacts/macos/smoke.log
          cd app/desktop/dist-artifacts/macos
          shasum -a 256 Listency-macos.zip smoke.log > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: listency-macos-${{ github.sha }}
          if-no-files-found: warn
          path: |
            app/desktop/dist-artifacts/macos/**
