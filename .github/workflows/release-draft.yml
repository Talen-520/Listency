name: Release Draft

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update, for example v0.1.0-alpha.1"
        required: true
        default: "v0.1.0-alpha.1"
      require_signed:
        description: "Fail the release if signing/notarization secrets are missing"
        required: true
        type: boolean
        default: false
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-draft-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  REQUIRE_SIGNED: ${{ github.event_name == 'workflow_dispatch' && inputs.require_signed || false }}

jobs:
  macos:
    name: Build macOS release artifact
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/backend/requirements.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/desktop/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run backend tests
        working-directory: app/backend
        run: python -m unittest discover -s tests

      - name: Install desktop dependencies
        working-directory: app/desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: app/desktop
        run: pnpm run build

      - name: Build macOS backend sidecar
        working-directory: app/desktop
        run: pnpm run backend:sidecar

      - name: Smoke test packaged backend sidecar
        working-directory: app/desktop
        timeout-minutes: 3
        run: pnpm run backend:sidecar:smoke 2>&1 | tee smoke.log

      - name: Download cloudflared connector
        working-directory: app/desktop
        run: pnpm run cloudflared:sidecar

      - name: Check macOS signing readiness
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          write_env() {
            name="$1"
            value="$2"
            delimiter="LISTENCY_${name}_$(uuidgen | tr -d '-')"
            {
              echo "$name<<$delimiter"
              printf '%s\n' "$value"
              echo "$delimiter"
            } >> "$GITHUB_ENV"
          }

          signing_ready=false
          notarization_ready=false

          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            signing_ready=true
          fi

          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_ISSUER" ]; then
            notarization_ready=true
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            notarization_ready=true
          fi

          echo "MACOS_SIGNING_READY=$signing_ready" >> "$GITHUB_ENV"
          echo "MACOS_NOTARIZATION_READY=$notarization_ready" >> "$GITHUB_ENV"

          if [ "$signing_ready" = "true" ]; then
            write_env "APPLE_CERTIFICATE" "$APPLE_CERTIFICATE"
            write_env "APPLE_CERTIFICATE_PASSWORD" "$APPLE_CERTIFICATE_PASSWORD"
            write_env "APPLE_SIGNING_IDENTITY" "$APPLE_SIGNING_IDENTITY"
          fi

          if [ "$signing_ready" = "true" ]; then
            if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_BASE64" ] && [ -n "$APPLE_API_ISSUER" ]; then
              write_env "APPLE_API_KEY" "$APPLE_API_KEY"
              write_env "APPLE_API_KEY_BASE64" "$APPLE_API_KEY_BASE64"
              write_env "APPLE_API_ISSUER" "$APPLE_API_ISSUER"
            elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
              write_env "APPLE_ID" "$APPLE_ID"
              write_env "APPLE_PASSWORD" "$APPLE_PASSWORD"
              write_env "APPLE_TEAM_ID" "$APPLE_TEAM_ID"
            fi
          fi

          if [ "$REQUIRE_SIGNED" = "true" ] && { [ "$signing_ready" != "true" ] || [ "$notarization_ready" != "true" ]; }; then
            echo "::error title=macOS signing secrets missing::Set APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, and either App Store Connect API key secrets or Apple ID notarization secrets."
            exit 1
          fi

      - name: Prepare App Store Connect API key
        run: |
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_BASE64" ]; then
            key_dir="$RUNNER_TEMP/apple-notary"
            mkdir -p "$key_dir"
            key_path="$key_dir/AuthKey_${APPLE_API_KEY}.p8"
            printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
            echo "APPLE_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          fi

      - name: Build macOS Tauri app and installer
        working-directory: app/desktop
        run: pnpm exec tauri build --ci --bundles app,dmg

      - name: Verify macOS signature and notarization
        if: env.MACOS_SIGNING_READY == 'true'
        run: |
          app_path="app/desktop/src-tauri/target/release/bundle/macos/Listency.app"
          codesign --verify --deep --strict --verbose=2 "$app_path"

          if [ "$MACOS_NOTARIZATION_READY" = "true" ]; then
            xcrun stapler validate "$app_path"
          fi

      - name: Smoke test macOS desktop launcher
        working-directory: app/desktop
        timeout-minutes: 3
        run: pnpm run macos:launcher:smoke

      - name: Stage macOS release artifacts
        run: |
          stage="app/desktop/dist-artifacts/macos"
          bundle_root="app/desktop/src-tauri/target/release/bundle"
          rm -rf "$stage"
          mkdir -p "$stage"

          ditto -c -k --sequesterRsrc --keepParent "$bundle_root/macos/Listency.app" "$stage/Listency-macos.zip"

          if [ -d "$bundle_root/dmg" ]; then
            find "$bundle_root/dmg" -maxdepth 1 -type f -name "*.dmg" -exec cp {} "$stage/" \;
          fi

          cp app/desktop/smoke.log "$stage/smoke.log"
          {
            echo "platform=macos"
            echo "release_tag=$RELEASE_TAG"
            echo "signed=$MACOS_SIGNING_READY"
            echo "notarization_configured=$MACOS_NOTARIZATION_READY"
            echo "require_signed=$REQUIRE_SIGNED"
          } > "$stage/SIGNING_STATUS.txt"

          cd "$stage"
          shasum -a 256 $(find . -maxdepth 1 -type f ! -name "SHA256SUMS.txt" -print | sort) > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: listency-macos-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: app/desktop/dist-artifacts/macos/**

  windows:
    name: Build Windows release artifact
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: app/backend/requirements.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: app/desktop/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        working-directory: app/backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Run backend tests
        working-directory: app/backend
        run: python -m unittest discover -s tests

      - name: Install desktop dependencies
        working-directory: app/desktop
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: app/desktop
        run: pnpm run build

      - name: Build Windows backend sidecar
        working-directory: app/desktop
        run: pnpm run backend:sidecar

      - name: Smoke test packaged backend sidecar
        working-directory: app/desktop
        timeout-minutes: 3
        run: |
          pnpm run backend:sidecar:smoke *> smoke.log
          $exitCode = $LASTEXITCODE
          Get-Content smoke.log
          if ($exitCode -ne 0) {
            $message = (Get-Content smoke.log -Raw).Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Packaged backend smoke failed::$message"
            exit $exitCode
          }

      - name: Download cloudflared connector
        working-directory: app/desktop
        run: pnpm run cloudflared:sidecar

      - name: Check Windows signing readiness
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: |
          $signingReady = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)
          "WINDOWS_SIGNING_READY=$($signingReady.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_ENV -Append

          if ($env:REQUIRE_SIGNED -eq "true" -and -not $signingReady) {
            Write-Output "::error title=Windows signing secrets missing::Set WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD."
            exit 1
          }

          if (-not $signingReady) {
            return
          }

          $timestampUrl = $env:WINDOWS_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }

          $certPath = Join-Path $env:RUNNER_TEMP "listency-codesign.pfx"
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          Import-PfxCertificate -FilePath $certPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword | Out-Null

          $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certPath, $env:WINDOWS_CERTIFICATE_PASSWORD)
          $thumbprint = $cert.Thumbprint.Replace(" ", "")
          "WINDOWS_CERTIFICATE_THUMBPRINT=$thumbprint" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_TIMESTAMP_URL=$timestampUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "WINDOWS_TAURI_CONFIG=src-tauri/tauri.windows.signing.json" | Out-File -FilePath $env:GITHUB_ENV -Append

          $signingConfig = @{
            bundle = @{
              windows = @{
                certificateThumbprint = $thumbprint
                digestAlgorithm = "sha256"
                timestampUrl = $timestampUrl
              }
            }
          } | ConvertTo-Json -Depth 8
          Set-Content -Path "app/desktop/src-tauri/tauri.windows.signing.json" -Value $signingConfig -Encoding utf8

      - name: Sign Windows sidecar inputs
        if: env.WINDOWS_SIGNING_READY == 'true'
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            Write-Output "::error title=signtool missing::Could not find signtool.exe on the Windows runner."
            exit 1
          }

          $targets = Get-ChildItem "app/desktop/src-tauri/binaries" -File -Filter "listency-backend-*.exe"
          if (-not $targets) {
            Write-Output "::error title=No Windows sidecar signing targets::No listency-backend sidecar executable was found."
            exit 1
          }

          foreach ($target in $targets) {
            $signature = Get-AuthenticodeSignature $target.FullName
            if ($signature.Status -eq "NotSigned") {
              & $signtool.FullName sign /fd SHA256 /td SHA256 /tr $env:WINDOWS_TIMESTAMP_URL /sha1 $env:WINDOWS_CERTIFICATE_THUMBPRINT $target.FullName
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }
          }

      - name: Build Windows Tauri installer
        working-directory: app/desktop
        shell: pwsh
        run: |
          if ($env:WINDOWS_SIGNING_READY -eq "true") {
            pnpm exec tauri build --ci --bundles nsis --config $env:WINDOWS_TAURI_CONFIG
          } else {
            pnpm exec tauri build --ci --bundles nsis
          }

      - name: Package portable Windows app
        working-directory: app/desktop
        run: pnpm run windows:portable

      - name: Smoke test Windows desktop launcher
        working-directory: app/desktop
        timeout-minutes: 3
        run: pnpm run windows:launcher:smoke

      - name: Stage Windows release artifacts
        shell: pwsh
        run: |
          $release = Resolve-Path "app/desktop/src-tauri/target/release"
          $stage = "app/desktop/dist-artifacts/windows"
          Remove-Item $stage -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $stage | Out-Null

          Copy-Item "$release/portable" "$stage/portable" -Recurse

          if (Test-Path "app/desktop/smoke.log") {
            Copy-Item "app/desktop/smoke.log" "$stage/smoke.log"
          }

          $nsis = Join-Path $release "bundle/nsis"
          if (Test-Path $nsis) {
            Copy-Item "$nsis/*.exe" $stage -ErrorAction SilentlyContinue
          }

      - name: Sign staged Windows executables
        if: env.WINDOWS_SIGNING_READY == 'true'
        shell: pwsh
        run: |
          $stage = Resolve-Path "app/desktop/dist-artifacts/windows"
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            Write-Output "::error title=signtool missing::Could not find signtool.exe on the Windows runner."
            exit 1
          }

          $targets = Get-ChildItem $stage -File -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -like "Listency*" -or $_.Name -like "listency-backend*" }

          if (-not $targets) {
            Write-Output "::error title=No Windows signing targets::No Listency executables were found in staged artifacts."
            exit 1
          }

          foreach ($target in $targets) {
            $signature = Get-AuthenticodeSignature $target.FullName
            if ($signature.Status -eq "NotSigned") {
              & $signtool.FullName sign /fd SHA256 /td SHA256 /tr $env:WINDOWS_TIMESTAMP_URL /sha1 $env:WINDOWS_CERTIFICATE_THUMBPRINT $target.FullName
              if ($LASTEXITCODE -ne 0) {
                exit $LASTEXITCODE
              }
            }
          }

      - name: Verify Windows signatures
        if: env.WINDOWS_SIGNING_READY == 'true'
        shell: pwsh
        run: |
          $stage = Resolve-Path "app/desktop/dist-artifacts/windows"
          $targets = Get-ChildItem $stage -File -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -like "Listency*" -or $_.Name -like "listency-backend*" }

          $bad = @()
          foreach ($target in $targets) {
            $signature = Get-AuthenticodeSignature $target.FullName
            Write-Host "$($target.FullName): $($signature.Status)"
            if ($signature.Status -ne "Valid") {
              $bad += $target.FullName
            }
          }

          if ($bad.Count -gt 0) {
            Write-Output "::error title=Windows signature verification failed::$($bad -join '; ')"
            exit 1
          }

      - name: Write Windows checksums
        shell: pwsh
        run: |
          $root = Resolve-Path "app/desktop/dist-artifacts/windows"
          $statusPath = Join-Path $root "SIGNING_STATUS.txt"
          @(
            "platform=windows",
            "release_tag=$env:RELEASE_TAG",
            "signed=$env:WINDOWS_SIGNING_READY",
            "require_signed=$env:REQUIRE_SIGNED"
          ) | Set-Content -Path $statusPath -Encoding utf8

          $files = Get-ChildItem $root -File -Recurse | Where-Object { $_.Name -ne "SHA256SUMS.txt" }
          $lines = $files | Sort-Object FullName | ForEach-Object {
            $relative = $_.FullName.Substring($root.Path.Length + 1).Replace("\", "/")
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            "$hash  $relative"
          }
          $checksumPath = Join-Path $root "SHA256SUMS.txt"
          Set-Content -Path $checksumPath -Value $lines -Encoding utf8
          Get-Content $checksumPath

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: listency-windows-${{ env.RELEASE_TAG }}
          if-no-files-found: error
          path: app/desktop/dist-artifacts/windows/**

  draft-release:
    name: Create GitHub draft release
    runs-on: ubuntu-latest
    needs: [macos, windows]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Build release notes and checksums
        run: |
          mkdir -p release-assets

          find release-artifacts -type f -print0 |
            sort -z |
            xargs -0 shasum -a 256 > release-assets/SHA256SUMS-files.txt

          {
            echo "# Listency $RELEASE_TAG"
            echo
            echo "Draft release generated by GitHub Actions."
            echo
            echo "## Artifacts"
            echo
            echo "- macOS: app zip plus DMG when Tauri produces one."
            echo "- Windows: NSIS installer plus portable app folder."
            echo "- Checksums: per-platform SHA256SUMS.txt and top-level SHA256SUMS-all.txt."
            echo
            echo "## Signing"
            echo
            echo "Each platform artifact includes SIGNING_STATUS.txt. If signing secrets were not configured, this draft is an unsigned build."
            echo
            echo "## macOS unsigned build note"
            echo
            echo 'If macOS shows `"Listency" is damaged and can'\''t be opened`, Gatekeeper is blocking the unsigned downloaded app. For builds downloaded from this repository, remove the quarantine flag after extracting or installing the app:'
            echo
            echo '```bash'
            echo 'xattr -dr com.apple.quarantine /path/to/Listency.app'
            echo '```'
            echo
            echo "This prompt is expected for unsigned builds."
          } > RELEASE_NOTES.md

          for artifact_dir in release-artifacts/*; do
            if [ -d "$artifact_dir" ]; then
              archive_name="$(basename "$artifact_dir").zip"
              (cd release-artifacts && zip -r "../release-assets/$archive_name" "$(basename "$artifact_dir")")
            fi
          done

          cp RELEASE_NOTES.md release-assets/RELEASE_NOTES.md
          (cd release-assets && shasum -a 256 *.zip SHA256SUMS-files.txt RELEASE_NOTES.md > SHA256SUMS-all.txt)

          cat release-assets/SHA256SUMS-all.txt

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t assets < <(find release-assets -maxdepth 1 -type f -print | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          body="$(cat release-assets/RELEASE_NOTES.md)"
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" --jq '.id' 2>/dev/null || true)"

          if [ -n "$release_id" ]; then
            echo "Updating existing release $RELEASE_TAG ($release_id)."
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f name="Listency ${RELEASE_TAG}" \
              -f body="$body" \
              -F draft=true \
              -F prerelease=true >/dev/null
          else
            echo "Creating draft release $RELEASE_TAG."
            release_id="$(gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$GITHUB_SHA" \
              -f name="Listency ${RELEASE_TAG}" \
              -f body="$body" \
              -F draft=true \
              -F prerelease=true \
              --jq '.id')"
          fi

          for asset in "${assets[@]}"; do
            name="$(basename "$asset")"
            echo "Uploading $name."

            while IFS= read -r existing_asset_id; do
              if [ -n "$existing_asset_id" ]; then
                gh api \
                  --method DELETE \
                  "repos/${GITHUB_REPOSITORY}/releases/assets/${existing_asset_id}" >/dev/null
              fi
            done < <(gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" --jq ".[] | select(.name == \"$name\") | .id")

            encoded_name="$(python3 -c 'import sys, urllib.parse; print(urllib.parse.quote(sys.argv[1]))' "$name")"
            curl --fail-with-body -sS \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$asset" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=${encoded_name}" >/dev/null
          done
